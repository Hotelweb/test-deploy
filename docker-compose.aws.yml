services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./.env.production
    environment:
      PORT: 3000
    restart: unless-stopped
    expose:
      - "3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${PUBLIC_API_URL}
    depends_on:
      - server
    restart: unless-stopped
    ports:
      - "80:80"
